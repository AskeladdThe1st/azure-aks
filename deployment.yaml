apiVersion: apps/v1
kind: Deployment
metadata:
  name: infopro-app-deployment
  namespace: default
  labels:
    app: infopro-app
spec:
  replicas: 2 # High Availability (stability requirement)
  selector:
    matchLabels:
      app: infopro-app
  template:
    metadata:
      labels:
        app: infopro-app
    spec:
      containers:
      - name: web-app
        image: <your-acr-name>.azurecr.io/infopro-app:latest # Replace with your ACR name
        ports:
        - containerPort: 80

        # Self-healing probes (Fulfills the high operational stability requirement)
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: infopro-app-service
  namespace: default
spec:
  type: LoadBalancer # Automatically creates a public IP in Azure
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: infopro-app
