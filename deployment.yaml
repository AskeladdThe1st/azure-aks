apiVersion: apps/v1
kind: Deployment
metadata:
  name: infopro-app-deployment
  namespace: default
  labels:
    app: infopro-app
spec:
  replicas: 1 # Set to 1 to match the single-node setup
  selector:
    matchLabels:
      app: infopro-app
  template:
    metadata:
      labels:
        app: infopro-app
    spec:
      containers:
      - name: web-app
        image: acrforinfoproprod.azurecr.io/infopro-app:latest
        ports:
        - containerPort: 80

        # High stability self-healing probes
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 3
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: infopro-app-service
  namespace: default
spec:
  type: LoadBalancer # Exposes your application to the internet
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: infopro-app
